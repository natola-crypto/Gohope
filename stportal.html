<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Natola CDSS Student Portal</title>
  <link rel="icon" type="image/png" href="toplogo.png">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      /* Same theme colors */
      --bg: #f6f9ff;
      --surface: rgba(255,255,255,.78);
      --surface-2: rgba(255,255,255,.58);
      --stroke: rgba(17, 38, 74, .12);

      --ink: #0a1a33;
      --muted: rgba(10, 26, 51, .72);
      --subtle: rgba(10, 26, 51, .56);

      --navy: #071a3a;
      --navy-2: #0b2b66;
      --sky: #4db8ff;
      --sky-2: #9fe0ff;
      --silver: #c7d0dc;
      --silver-2: #e7edf6;

      --good: #1aa37a;
      --warn: #ffb020;
      --bad: #ff4d6d;

      --shadow: 0 22px 60px rgba(7, 26, 58, .16);
      --shadow-soft: 0 10px 30px rgba(7, 26, 58, .10);

      --r-sm: 14px;
      --r-md: 18px;
      --r-lg: 26px;

      --max: 900px;

      --h1: clamp(1.65rem, 1.1rem + 2.2vw, 2.8rem);
      --h2: clamp(1.2rem, .9rem + 1.2vw, 1.6rem);
      --h3: clamp(1.05rem, .9rem + .6vw, 1.2rem);
      --p: clamp(.95rem, .9rem + .2vw, 1.05rem);

      --ease: cubic-bezier(.2,.8,.2,1);
    }

    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      font-family: "Sora", system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 12px;
    }

    h1 {
      font-family: "Space Grotesk", "Sora", sans-serif;
      font-size: var(--h1);
      margin-bottom: 12px;
      color: var(--navy-2);
      text-align: center;
    }

    .container {
      background: var(--surface);
      border-radius: var(--r-lg);
      box-shadow: var(--shadow);
      max-width: var(--max);
      width: 100%;
      padding: 24px 32px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* Student info section replacing search */
    .studentInfo {
      font-size: var(--p);
      color: var(--navy-2);
      font-weight: 600;
      display: flex;
      flex-wrap: wrap;
      gap: 50px;
      justify-content: flex-start;
      user-select: none;
    }
  
    label {
      font-weight: 700;
      color: var(--sky);
      margin-right: 6px;
    }
    .term_title{
      font-weight: 700;
      font-size: 1.2rem;
      color: var(--sky);
      margin: auto;
      text-align: center;
    }

    /* Table styles */
    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0 12px;
      font-size: var(--p);
      color: var(--ink);
    }

    thead tr {
      background: var(--sky-2);
      color: var(--navy);
      font-weight: 600;
      border-radius: var(--r-md);
      box-shadow: 0 4px 10px rgba(77,184,255,.15);
      
    }
    .gradeFilter{
      background: var(--sky-2);
      color: var(--navy);
      font-weight: 700;
      font-size: 16px;
      border: 0px solid black;

    }
    thead th {
      padding: 14px 18px;
      padding-left: 8px;
      text-align: left;
      user-select: none;
    }

    tbody tr {
      background: var(--surface-2);
      box-shadow: 0 8px 20px rgba(7,26,58,.08);
      border-radius: var(--r-md);
      transition: background .3s var(--ease), box-shadow .3s var(--ease);
      cursor: default;
    }

    tbody tr:hover {
      background: var(--sky-2);
      box-shadow: 0 14px 30px rgba(7,26,58,.12);
    }

    tbody td {
      padding: 14px 18px;
      vertical-align: middle;
      border-bottom: none;
    }

    /* Rounded corners on first and last cells */
    tbody tr td:first-child {
      border-top-left-radius: var(--r-md);
      border-bottom-left-radius: var(--r-md);
    }
    tbody tr td:last-child {
      border-top-right-radius: var(--r-md);
      border-bottom-right-radius: var(--r-md);
      text-align: left;
      font-weight: 600;
    }

    /* Grade badges */
    .grade {
      display: inline-block;
      padding: 6px 14px;
      border-radius: 999px;
      font-weight: 700;
      font-family: "Space Grotesk", "Sora", sans-serif;
      color: white;
      min-width: 48px;
      text-align: center;
      user-select: none;
    }
    .grade.A { background: var(--good); }
    .grade.B { background: var(--sky); color: var(--navy); }
    .grade.C { background: var(--silver); color: var(--navy); }
    .grade.D { background: var(--warn); }
    .grade.F { background: var(--bad); }
    .grade.one { background: var(--good); }
    .grade.two { background: var(--good); }
    .grade.three { background: var(--sky); color: var(--navy); }
    .grade.four { background: var(--sky); color: var(--navy); }
    .grade.five { background: var(--silver); color: var(--navy); }
    .grade.six { background: var(--silver); color: var(--navy); }
    .grade.seven { background: var(--warn); }
    .grade.eight { background: var(--warn); }
    .grade.nine { background: var(--bad); }
    .grade.dash { background: var(--bad); }

    .passed { 
      background-color: var(--good);
      padding: 4px 13px; 
      border-radius: 13px;
      color: white;
    }
    .failed {
       background: var(--bad);
        padding: 4px 13px; 
      border-radius: 13px; 
      color: white;
    }
    /* Responsive */
    @media (max-width: 720px) {
      .container {
        padding: 16px 20px;
        
      }
      .exam_display{
        overflow: scroll;
      }
      .subject{
        position: sticky;
        left:0px;
        background-color:white;
        padding: 5px 12px;
      }
      #thesub{
        position: sticky;
        left:0px;
        background-color:var(--sky-2);
        padding: 5px 12px;
      }
      tbody tr {
       
        grid-template-columns: 1fr 1fr;
        grid-template-rows: auto auto auto auto auto;
        gap: 6px 12px;
        padding: 16px 12px;
      }
      tbody tr td {
        padding: 0;
        border-radius: 0;
      }
      tbody tr td:first-child {
        border-radius: 0;
      }
      tbody tr td:last-child {
        border-radius: 0;
        text-align: left;
        font-weight: 400;
      }
      tbody tr td.subject {
        grid-column: 1 / 3;
        font-weight: 600;
        font-size: 1.1rem;
        color: var(--navy-2);
      }
      tbody tr td.position {
        font-weight: 600;
        font-size: 0.8rem;
        justify-self: start;
      }
      tbody tr td.grade {
        justify-self: start;
        font-weight: 700;
        font-size: 1rem;
        padding-top: 6px;
      }
      tbody tr td.score {
        justify-self: end;
        font-weight: 600;
        font-size: 1rem;
        color: var(--muted);
      }
      tbody tr td.comments {
        grid-column: 1 / 3;
        font-style: italic;
        color: var(--muted);
        font-size: 0.9rem;
        padding-top: 6px;
      }
      tbody tr td.teacher {
        grid-column: 1 / 3;
        font-size: 0.95rem;
        color: var(--subtle);
        padding-top: 4px;
      }
    }

    /* Filter & search styles remain unchanged */

    /* No results message */
    .noResults {
      text-align: center;
      font-size: var(--p);
      color: var(--muted);
      padding: 10px 0;
    }

    /* Aggregate card */
    .aggregateCard {
      background: var(--surface-2);
      border-radius: var(--r-lg);
      box-shadow: var(--shadow-soft);
      padding: 20px 28px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-width: var(--max);
      width: 100%;
      color: var(--navy-2);
    }
    .aggregateCard h2 {
      margin: 0;
      font-family: "Space Grotesk", "Sora", sans-serif;
      font-size: var(--h2);
      border-bottom: 2px solid var(--sky);
      padding-bottom: 6px;
    }
    .aggregateCard .remarks {
      font-style: italic;
      font-size: 1rem;
      color: var(--muted);
    }

    .st_details {
      background-color: white;
      border-radius: var(--r-lg);
      box-shadow: var(--shadow-soft);
      padding: 20px 28px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-width: var(--max);
      width: 100%;
      color: var(--navy-2);
      position: sticky;
      top:0px;
      z-index: 10;
      
    }
    .st_details h2 {
      margin: 0;
      font-family: "Space Grotesk", "Sora", sans-serif;
      font-size: var(--h2);
      border-bottom: 2px solid var(--sky);
      padding-bottom: 6px;
    }
    .summary {
      font-size: 1.1rem;
      font-weight: 600;
      display: flex;
    }
    .st_details .remarks {
      font-style: italic;
      font-size: 1rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <h1>Natola CDSS</h1>
  <section class="st_details">
    <h2 id="st_name">Tiyesele Koding</h2>
      <div class="summary" ><label>Exam No:</label><div id="st_no"></div></div>
      <div class="summary" id="the_sex" ><label>Sex:</label><div id="st_sex"></div></div>
      
  </section><br>

  <div class="container" role="main" aria-label="Student results dashboard">
    
    <div class="term_title">End of Term 1 Examination Results </div>
    <div class = "exam_display" id = "exam_display">
      <table aria-describedby="resultsDesc" role="table" id="results_table">
      <caption id="resultsDesc" class="sr-only">List of subjects and student grades with position and comments</caption>
      <thead>
        <tr>
          <th scope="col" id = "thesub">Subject</th>
          <th scope="col">Score</th>
          <th scope="col">Position</th>
          <th scope="col">Grade</th>
          <th scope="col">Comments</th>
    
        </tr>
      </thead>
      <tbody id="resultsBody">
        <!-- JS fills -->
      </tbody>
    </table>
    </div>
    <section class="studentInfo" aria-label="Student information" id = "student_summary">
      <div class="summary" ><label>Class:</label><div id="class"></div></div>
      <div class="summary" ><label>Position:</label><div id="class_rank"></div></div>
      <div class="summary" ><label id = "aggregate">Average:</label><div id="class_grade"></div></div>
      <div class="summary" ><label>Status:</label><div id="status"></div></div>
    </section>
   

    <div id="noResults" class="noResults" style="color:var(--navy-2)"> For more assistance contact the ICT officer on whatsapp <strong>0996790796</strong></div>
  </div>
  <script src="term1_data.js"></script>
  <script>
    const getpara = new URL(window.location.href);
    const gotV = getpara.searchParams.get("st_no");
    const studentName = document.getElementById("st_name");
    const studentNo = document.getElementById("st_no");
    const studentSex = document.getElementById("st_sex");
    const studSex = document.getElementById("the_sex");
    
  const sexLabel = {
    "M":"Male",
    "F": "Female"
  }
    students.forEach(element => {
          if(element["st_no"] == gotV){
            studentName.textContent = element["st_name"];
            studentNo.textContent = element["st_no"];
            studentSex.textContent = sexLabel[element["st_sex"]];
            if(element["st_sex"]==""){
              studSex.style.display = "none";
            }
          }
        });
const subjects = ["agr","bib","bio","che","chi","com","eng","geo","his","mat","phy","soc"];
const subjectsNames ={
  "agr":"Agriculture","bib":"Bible Knowledge","bio":"Biology","che":"Chemistry",
  "chi":"Chichewa","com":"Computer Studies","eng":"English","geo":"Geography",
  "his": "History","mat":"Mathematics","phy":"Physics","soc":"Social & Life"
};

const tbody = document.getElementById('resultsBody');
      tbody.innerHTML = '';
var studentFound = false;   
termlyData.forEach(element => {
        if(element["st_no"] == gotV){
          studentFound = true;
          if(element["class"]== 3 || element["class"]== 4){
            const aggr = document.getElementById("aggregate");
            aggr.textContent = "Aggragete Points:";
            const comments = {
              "1":"Excellent! keep it up",
              "2":"Excellent! keep it up",
              "3":"Good! but aim higher",
              "4":"Good! but aim higher",
              "5":"Can do better than this",
              "6":"Can do better than this",
              "7":"be ambitious",
              "8":"extra effort still needed",
              "9":"work hard to improve ",
              
            }
            const styleGrades = {
              
              "1":"one",
              "2":"two",
              "3":"three",
              "4":"four",
              "5":"five",
              "6":"six",
              "7":"seven",
              "8":"eight",
              "9":"nine",
          
            }
            subjects.forEach( subject =>{
            const tr = document.createElement('tr');
            if(element["class"]== 4){
                  if(element[subject] >= 0 && subject != "com"){
                  var subjectTotal = 0;
                  tr.innerHTML = `
                  <td class="subject">${subjectsNames[subject]}</td>
                  <td class="score">${element[subject]}%</td>
                  <td class="position">${element[subject+"_rank"]}/${getTotal(element["class"], subject)}</td>
                  <td><span class= "grade ${styleGrades[element[subject+"_grade"]]}">${element[subject+"_grade"]}</span></td>
                  <td class="comments">${comments[element[subject+"_grade"]]}</td>
                  
                `;
                tbody.appendChild(tr);
                }
            }else{
              if(element[subject] >= 0 ){
                  tr.innerHTML = `
                  <td class="subject">${subjectsNames[subject]}</td>
                  <td class="score">${element[subject]}%</td>
                  <td class="position">${element[subject+"_rank"]}/${getTotal(element["class"], subject)}</td>
                  <td><span class= "grade ${styleGrades[element[subject+"_grade"]]}">${element[subject+"_grade"]}</span></td>
                  <td class="comments">${comments[element[subject+"_grade"]]}</td>
                  
                `;
                tbody.appendChild(tr);
                }

            }
              
          });

          subjects.forEach( subject =>{
            
            const tr = document.createElement('tr');
              if(element[subject] =="-"){
                tr.style.backgroundColor = "#f9d5d5ea";
                tr.innerHTML = `
                <td class="subject">${subjectsNames[subject]}</td>
                <td class="comments" colspan = "4" style = "padding-left:5px;">Did not write</td>
                
              `;
              tbody.appendChild(tr);
              }
          });
           subjects.forEach( subject =>{
            const tr = document.createElement('tr');
              if(element[subject] =="--"){
                tr.style.backgroundColor = "#e2eefaea";
                tr.innerHTML = `
                <td class="subject">${subjectsNames[subject]}</td>
                <td class="comments" colspan = "4" style = "padding-left:5px;">Does not take</td>
              `;
              tbody.appendChild(tr); 
              }
          });
            
          const classN = document.getElementById('class');
          const classG = document.getElementById('class_grade');
          const theStatus = document.getElementById('status');
          classN.textContent = element['class'];
          classG.textContent = element['class_grade'];
          theStatus.textContent = element['status'];
            if(element['status'] == "passed"){
              theStatus.classList.add("passed");
            }else{
              theStatus.classList.add("failed");
            }
          }else{
            const comments = {
              "A":"Keep it up. don't relax",
              "B":"Aim at better than this",
              "C":"Has potential to beat this",
              "D":"Extra effort still needed",
              "F":"Work very hard to improve",
            }
            subjects.forEach( subject =>{
            if(element[subject] >= 0 ){
              const tr = document.createElement('tr');
              tr.innerHTML = `
                <td class="subject">${subjectsNames[subject]}</td>
                <td class="score">${element[subject]}%</td>
                <td class="position">${element[subject+"_rank"]}/${getTotal(element["class"], subject)}</td>
                <td><span class="grade ${element[subject+"_grade"]}">${element[subject+"_grade"]}</span></td>
                <td class="comments">${comments[element[subject+"_grade"]]}</td>
                
              `;
              tbody.appendChild(tr);
            }
          });
          subjects.forEach( subject =>{
            const tr = document.createElement('tr');
            if(element[subject] =="-" ){
                tr.style.backgroundColor = "#f9d5d5ea";
                tr.innerHTML = `
                <td class="subject">${subjectsNames[subject]}</td>
                <td class="comments" colspan = "4" style = "padding-left:5px;">Did not write</td>
                
              `;
              tbody.appendChild(tr);
              
            }
          });
            
          const classN = document.getElementById('class');
          
          const classG = document.getElementById('class_grade');
          const theStatus = document.getElementById('status');
          classN.textContent = "Form "+element['class'];
          
          classG.textContent = element['class_grade'];
          theStatus.textContent = element['status'];
            if(element['status'] == "passed"){
              theStatus.classList.add("passed");
            }else{
              theStatus.classList.add("failed");
            }
          }
          const position = document.getElementById('class_rank');
          position.textContent = element['class_rank'];
        }
      
      });
      if(studentFound == false){
          const resultsTable = document.getElementById('results_table');
          resultsTable.style.display = "none";
          const studentSummary = document.getElementById('student_summary');
          studentSummary.style.display = "none";
          const examDisplay = document.getElementById('exam_display');
          examDisplay.innerHTML = '<p style = "text-align: center;">Your results for this term have not been found, please consult your form teacher.</p>';
        }
function getClassCount(st_class){
  var classTotal =0;
  termlyData.forEach(record => {
      if(record["class"] == st_class){
         classTotal++;
        }
  });
  return classTotal;
}

function getTotal(st_class, the_subject){
  var no_sat =0;

  termlyData.forEach(record => {
        if(record["class"] == st_class){
          
          if(record[the_subject] >= 0){
            no_sat++;
          }
        }
  });
  return no_sat;
}
  </script>

  <style>
    /* Screen reader only */
    .sr-only {
      position: absolute !important;
      width: 1px !important;
      height: 1px !important;
      padding: 0 !important;
      margin: -1px !important;
      overflow: hidden !important;
      clip: rect(0,0,0,0) !important;
      white-space: nowrap !important;
      border: 0 !important;
    }
  </style>
</body>
</html>
